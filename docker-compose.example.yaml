services:
  # Proxy bridge: listens locally WITHOUT auth, forwards to your authenticated
  # SOCKS5 proxy. This is what lets Chromium (which can't do SOCKS5 auth) work.
  proxy-bridge:
    image: ginuerzh/gost:latest
    # Replace PROXY_USER / PROXY_PASS / PROXY_HOST / PROXY_PORT with your values.
    command: -L=socks5://:1080 -F=socks5://PROXY_USER:PROXY_PASS@PROXY_HOST:PROXY_PORT
    restart: unless-stopped

  chromium:
    image: lscr.io/linuxserver/chromium:latest
    container_name: chromium
    security_opt:
      - seccomp:unconfined
    environment:
      - CUSTOM_USER=changeme          # login for the browser web UI
      - PASSWORD=changeme             # password for the browser web UI
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Lagos
      # Point Chromium at the LOCAL bridge (no credentials here on purpose):
      - CHROME_CLI=--proxy-server=socks5://proxy-bridge:1080
    volumes:
      - /root/chromium/config:/config
    ports:
      - "0.0.0.0:3010:3000"          # HTTP UI
      - "0.0.0.0:3011:3001"          # HTTPS UI
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - proxy-bridge
